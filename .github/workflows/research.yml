name: Research Pipeline

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 6 am UTC
  workflow_dispatch:
    inputs:
      niche:
        description: 'Target niche keyword (e.g. "freelance invoicing"). Overrides settings.json.'
        required: false
        default: ''
      seeds:
        description: 'Comma-separated keyword seeds (optional). Overrides settings.json seeds.'
        required: false
        default: ''
      run_hn:
        description: 'Run HackerNews scraper'
        type: boolean
        default: true
      run_reddit:
        description: 'Run Reddit scraper'
        type: boolean
        default: true
      run_keywords:
        description: 'Run keyword research'
        type: boolean
        default: true

jobs:
  research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/database.db
          key: research-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            research-db-${{ github.ref_name }}-

      - name: Run HackerNews scraper
        if: ${{ github.event.inputs.run_hn != 'false' }}
        run: node scripts/hn-scraper.js
        continue-on-error: true

      - name: Run Reddit scraper
        if: ${{ github.event.inputs.run_reddit != 'false' }}
        run: node scripts/reddit-scraper.js
        continue-on-error: true

      - name: Run keyword research
        if: ${{ github.event.inputs.run_keywords != 'false' }}
        run: node scripts/keyword-research.js
        env:
          RESEARCH_NICHE: ${{ github.event.inputs.niche }}
          RESEARCH_SEEDS: ${{ github.event.inputs.seeds }}
        continue-on-error: true

      - name: Export research results
        run: node scripts/export-research.js

      - name: Commit research output
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add output/
          git diff --staged --quiet || git commit -m "research: $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push origin HEAD
