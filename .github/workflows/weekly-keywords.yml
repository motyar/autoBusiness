name: Weekly Keyword Research

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  keyword-research:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/database.db
          key: database-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            database-${{ github.ref_name }}-

      - name: Run Keyword Research
        if: ${{ vars.KEYWORD_RESEARCH_ENABLED != 'false' }}
        run: node scripts/keyword-research.js
        continue-on-error: true

      - name: Run Trend Checker
        if: ${{ vars.TREND_CHECKER_ENABLED != 'false' }}
        run: node scripts/trend-checker.js
        continue-on-error: true

      - name: Run Convergence Scorer
        run: node scripts/convergence-scorer.js
        continue-on-error: true

      - name: Generate Summary
        run: node scripts/summary.js
        continue-on-error: true

      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/summary.md data/shortlist.json || true
          git diff --staged --quiet || git commit -m "chore: update weekly keyword summary [skip ci]"
          git push || true
