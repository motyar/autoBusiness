name: Email Sender (Tue-Thu)

on:
  schedule:
    - cron: '0 14 * * 2-4'
  workflow_dispatch:

jobs:
  send-emails:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      - name: Restore database cache
        uses: actions/cache@v4
        with:
          path: data/database.db
          key: database-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            database-${{ github.ref_name }}-

      - name: Run Email Finder
        if: ${{ vars.EMAIL_FINDER_ENABLED == 'true' }}
        run: node scripts/email-finder.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite-preview
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          APOLLO_API_KEY: ${{ secrets.APOLLO_API_KEY }}
        continue-on-error: true

      - name: Send Emails
        if: ${{ vars.EMAIL_SENDER_ENABLED == 'true' }}
        run: node scripts/emailer.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3.1-flash-lite-preview
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          LANDING_PAGE_URL: ${{ vars.LANDING_PAGE_URL }}
        continue-on-error: true

      - name: Generate Summary
        run: node scripts/summary.js
        continue-on-error: true

      - name: Commit summary
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions"
          git add data/summary.md || true
          git diff --staged --quiet || git commit -m "chore: update email summary [skip ci]"
          git push || true
